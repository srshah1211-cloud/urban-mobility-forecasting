services:
  postgres:
    image: ${POSTGRES_IMAGE}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn api.main:app --host ${API_HOST} --port ${API_PORT} --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: ${CONTAINER_DATABASE_URL}
      MODEL_PATH: ${MODEL_PATH}
      FEATURE_COLUMNS_PATH: ${FEATURE_COLUMNS_PATH}
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address ${DASHBOARD_HOST} --server.port ${DASHBOARD_PORT}
    env_file:
      - .env
    environment:
      DATABASE_URL: ${CONTAINER_DATABASE_URL}
      MODEL_PATH: ${MODEL_PATH}
      FEATURE_COLUMNS_PATH: ${FEATURE_COLUMNS_PATH}
    ports:
      - "${DASHBOARD_PORT}:${DASHBOARD_PORT}"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres_data:
